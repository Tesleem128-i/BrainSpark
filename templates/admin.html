<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Brainspark</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ink: #1a1a2e;
            --ink-soft: #4a4a6a;
            --surface: #f5f4f0;
            --surface2: #ffffff;
            --surface3: #eeedf0;
            --muted: #9898b0;
            --accent: #ff4f30;
            --green: #00a878;
            --blue: #3b6bff;
            --gold: #d4a017;
            --spark: #8b3cf7;
            --border: rgba(0,0,0,0.08);
            --border-strong: rgba(0,0,0,0.13);
            --radius: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 16px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.10);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 0 6vw; height: 68px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(245,244,240,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
            color: var(--accent); letter-spacing: -0.01em;
        }
        .nav-back {
            display: flex; align-items: center; gap: 6px;
            color: var(--ink-soft); font-size: .875rem; font-weight: 500;
            text-decoration: none; transition: color .15s;
        }
        .nav-back:hover { color: var(--ink); }

        /* ── LAYOUT ── */
        .wrap {
            max-width: 1100px; margin: 0 auto;
            padding: 96px 6vw 60px;
        }

        .page-header { margin-bottom: 32px; }
        .page-title {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 1.9rem; letter-spacing: -0.02em; color: var(--ink);
            margin-bottom: 4px;
        }
        .page-sub { color: var(--muted); font-size: .9rem; }

        /* ── STATS GRID ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow .2s, transform .2s;
        }
        .stat-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
        .stat-label {
            font-size: .7rem; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 8px;
        }
        .stat-value {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.7rem;
            letter-spacing: -0.02em; line-height: 1;
        }
        .stat-pill {
            display: inline-block; margin-top: 8px;
            padding: 2px 8px; border-radius: 99px;
            font-size: .68rem; font-weight: 600; letter-spacing: .03em;
        }

        /* ── CARD ── */
        .card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }
        .card-title {
            font-family: 'Syne', sans-serif; font-weight: 700;
            font-size: .95rem; color: var(--ink);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }

        /* ── TRANSACTIONS ── */
        .txn-row {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px; flex-wrap: wrap;
            transition: border-color .15s, box-shadow .15s;
        }
        .txn-row:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
        .txn-user-name {
            font-family: 'Syne', sans-serif; font-weight: 700;
            font-size: .9rem; margin-bottom: 2px;
        }
        .txn-meta { font-size: .76rem; color: var(--muted); }
        .txn-amount { font-size: .8rem; margin-top: 3px; color: var(--ink-soft); }
        .txn-tokens { color: var(--spark); font-weight: 700; }

        /* ── BUTTONS ── */
        .btn {
            padding: 7px 15px; border-radius: 50px;
            border: none; font-family: 'DM Sans', sans-serif;
            font-weight: 600; font-size: .78rem;
            cursor: pointer; transition: all .15s;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn i { font-size: .75rem; }
        .btn-green  { background: #e6f9f3; color: var(--green); border: 1px solid rgba(0,168,120,.18); }
        .btn-green:hover  { background: var(--green); color: #fff; }
        .btn-red    { background: #fef0ee; color: var(--accent); border: 1px solid rgba(255,79,48,.15); }
        .btn-red:hover    { background: var(--accent); color: #fff; }
        .btn-blue   { background: #edf1ff; color: var(--blue); border: 1px solid rgba(59,107,255,.15); }
        .btn-blue:hover   { background: var(--blue); color: #fff; }

        /* ── USER CARDS ── */
        #user-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 10px; }
        .user-card {
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: border-color .15s, box-shadow .15s;
        }
        .user-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
        .user-name {
            font-family: 'Syne', sans-serif; font-weight: 700;
            font-size: .9rem; margin-bottom: 2px;
        }
        .user-handle { font-size: .73rem; color: var(--muted); margin-bottom: 10px; }
        .user-stats {
            display: flex; justify-content: space-between;
            font-size: .8rem; color: var(--ink-soft);
        }
        .user-stats strong { font-weight: 700; }

        /* ── EMPTY STATE ── */
        .empty {
            padding: 20px 0; color: var(--muted); font-size: .875rem;
            display: flex; align-items: center; gap: 8px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            padding: 12px 20px; border-radius: 12px;
            font-weight: 600; font-size: .875rem;
            font-family: 'DM Sans', sans-serif;
            box-shadow: var(--shadow-lg);
            animation: slideUp .25s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── DONE STATE (payment flow) ── */
        .verify-state { border-radius: 14px; padding: 24px; text-align: center; }
        .verify-state.failed { background: #fef5f4; border: 1px solid rgba(255,79,48,.15); }
        .verify-state.warning { background: #fffbee; border: 1px solid rgba(212,160,23,.18); }
        .verify-icon { font-size: 2rem; margin-bottom: 10px; }
        .verify-title {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 1.15rem; margin-bottom: 8px;
        }
        .verify-msg { font-size: .875rem; color: var(--ink-soft); white-space: pre-line; margin-bottom: 18px; }
        .btn-spark {
            padding: 10px 22px; border-radius: 50px;
            border: none; font-family: 'DM Sans', sans-serif;
            font-weight: 700; font-size: .875rem;
            cursor: pointer; transition: all .2s;
            background: var(--spark); color: #fff;
            display: inline-flex; align-items: center; gap: 7px;
        }
        .btn-spark:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* ── DIVIDER ── */
        .section-sep {
            height: 1px; background: var(--border); margin: 20px 0;
        }
    </style>
</head>
<body>

<nav>
    <span class="nav-logo">⚡ Brainspark Admin</span>
    <a href="/dashboard" class="nav-back">
        <i class="fas fa-arrow-left"></i> Dashboard
    </a>
</nav>

<div class="wrap">

    <div class="page-header">
        <div class="page-title">Admin Panel</div>
        <div class="page-sub">Welcome back, Peace1. Here's your overview.</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value" id="stat-revenue" style="color:var(--green);">—</div>
            <span class="stat-pill" style="background:#e6f9f3;color:var(--green);">Revenue</span>
        </div>
        <div class="stat-card">
            <div class="stat-label">Platform Profit</div>
            <div class="stat-value" id="stat-profit" style="color:var(--spark);">—</div>
            <span class="stat-pill" style="background:#f3eeff;color:var(--spark);">Profit</span>
        </div>
        <div class="stat-card">
            <div class="stat-label">API Cost Covered</div>
            <div class="stat-value" id="stat-api" style="color:var(--blue);">—</div>
            <span class="stat-pill" style="background:#edf1ff;color:var(--blue);">API</span>
        </div>
        <div class="stat-card">
            <div class="stat-label">Tokens Issued</div>
            <div class="stat-value" id="stat-tokens" style="color:var(--gold);">—</div>
            <span class="stat-pill" style="background:#fffbee;color:var(--gold);">Issued</span>
        </div>
        <div class="stat-card">
            <div class="stat-label">Tokens Available</div>
            <div class="stat-value" id="stat-available" style="color:var(--spark);">—</div>
            <div style="font-size:.7rem;color:var(--muted);margin-top:6px;">Across all users</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pending Payments</div>
            <div class="stat-value" id="stat-pending" style="color:var(--accent);">—</div>
            <span class="stat-pill" style="background:#fef0ee;color:var(--accent);">Pending</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">
            <i class="fas fa-clock" style="color:var(--gold);font-size:.85rem;"></i>
            Pending Verifications
        </div>
        <div id="pending-list"></div>
    </div>

    <div class="card">
        <div class="card-title">
            <i class="fas fa-users" style="color:var(--blue);font-size:.85rem;"></i>
            Users with Tokens
        </div>
        <div id="user-list"></div>
    </div>

</div>

<script>
function showToast(msg, type='success') {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.cssText = `background:${type === 'success' ? 'var(--green)' : 'var(--accent)'};color:#fff;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

async function verifyPayment(id, action) {
    const res = await fetch('/api/admin/verify-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transaction_id: id, action })
    }).then(r => r.json());

    if (res.success) {
        showToast(action === 'approve' ? '✅ Approved! Tokens added.' : '❌ Rejected.');
        loadStats();
    } else {
        showToast('Error: ' + (res.error || 'Failed'), 'error');
    }
}

async function loadStats() {
    const data = await fetch('/api/admin/stats').then(r => r.json());
    if (!data.success) return;

    document.getElementById('stat-revenue').textContent  = '₦' + data.total_revenue.toLocaleString();
    document.getElementById('stat-profit').textContent   = '₦' + data.total_profit.toLocaleString();
    document.getElementById('stat-api').textContent      = '₦' + data.total_api_cost.toLocaleString();
    document.getElementById('stat-tokens').textContent   = data.total_tokens_issued?.toLocaleString() ?? '—';
    document.getElementById('stat-available').textContent = data.total_tokens_available?.toLocaleString() ?? '—';
    document.getElementById('stat-pending').textContent  = data.pending_transactions.length;

    /* ── pending transactions ── */
    const pendingList = document.getElementById('pending-list');
    if (!data.pending_transactions.length) {
        pendingList.innerHTML = `<div class="empty"><i class="fas fa-check-circle" style="color:var(--green);"></i> No pending payments — you're all caught up!</div>`;
    } else {
        pendingList.innerHTML = data.pending_transactions.map(t => `
            <div class="txn-row">
                <div style="flex:1;min-width:0;">
                    <div class="txn-user-name">${t.user_name}</div>
                    <div class="txn-meta">${t.user_email}</div>
                    <div class="txn-amount">₦${t.amount_paid.toLocaleString()} → <span class="txn-tokens">${t.tokens_added.toLocaleString()} tokens</span></div>
                    <div class="txn-meta" style="margin-top:2px;">${new Date(t.created_at).toLocaleString()}</div>
                </div>
                <a href="/uploads/receipts/${t.receipt_path}" target="_blank" class="btn btn-blue">
                    <i class="fas fa-receipt"></i> Receipt
                </a>
                <button onclick="verifyPayment(${t.id},'approve')" class="btn btn-green">
                    <i class="fas fa-check"></i> Approve
                </button>
                <button onclick="verifyPayment(${t.id},'reject')" class="btn btn-red">
                    <i class="fas fa-times"></i> Reject
                </button>
            </div>
        `).join('');
    }

    /* ── user cards ── */
    const userList = document.getElementById('user-list');
    if (!data.user_stats?.length) {
        userList.innerHTML = `<div class="empty"><i class="fas fa-user-slash" style="color:var(--muted);"></i> No users found.</div>`;
    } else {
        userList.innerHTML = data.user_stats.map(u => `
            <div class="user-card">
                <div class="user-name">${u.name}</div>
                <div class="user-handle">@${u.username}</div>
                <div class="user-stats">
                    <span>Balance: <strong style="color:var(--spark);">${u.spark_tokens.toLocaleString()}</strong></span>
                    <span>Spent: <strong style="color:var(--green);">₦${u.total_spent.toLocaleString()}</strong></span>
                </div>
            </div>
        `).join('');
    }
}

/* ── payment verification done-state handler ── */
function handleDoneState(res, doneState, doneIcon, doneTitle, doneMsg, showStep) {
    const isNoTokens = res.error && res.error.includes('NO_TOKENS');
    doneState.className = 'verify-state ' + (isNoTokens ? 'warning' : 'failed');
    doneIcon.textContent = isNoTokens ? '⚠️' : '❌';
    doneTitle.textContent = isNoTokens ? 'Tokens Not Available Right Now' : 'Verification Failed';
    doneMsg.style.whiteSpace = 'pre-line';
    doneMsg.textContent = isNoTokens
        ? 'We are currently out of Spark Tokens.\nPlease contact support and we will resolve this as soon as possible.'
        : (res.error || 'Could not verify your payment.');
    showStep('step-done');

    const tryBtn = document.querySelector('#step-done .btn-spark');
    if (isNoTokens) {
        tryBtn.innerHTML = '<i class="fas fa-envelope"></i> Contact Support';
        tryBtn.onclick = () => {
            document.getElementById('contact-section').style.display = '';
            document.getElementById('contact-section').scrollIntoView({ behavior: 'smooth' });
            showStep('step-amount');
        };
    } else {
        tryBtn.innerHTML = '<i class="fas fa-redo"></i> Try Again';
        tryBtn.onclick = () => { showStep('step-upload'); };
    }
}

document.addEventListener('DOMContentLoaded', loadStats);
setInterval(loadStats, 30000);
</script>
</body>
</html>
