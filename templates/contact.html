<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainspark — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --accent: #2d5be3;
    --accent2: #e8380d;
    --text: #1a1a2e;
    --muted: #6b6b7b;
    --border: #e2ddd6;
    --tag-bg: #eef1fc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* ── Header ── */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo span { color: #6c8aff; }

  header nav a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.875rem;
    margin-left: 1.5rem;
    transition: color 0.2s;
  }

  header nav a:hover { color: #fff; }

  /* ── Hero ── */
  .hero {
    background: var(--text);
    color: #fff;
    padding: 5rem 2rem 4rem;
    text-align: center;
  }

  .hero-badge {
    display: inline-block;
    background: rgba(108,138,255,0.2);
    color: #6c8aff;
    border: 1px solid rgba(108,138,255,0.3);
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.35rem 1rem;
    margin-bottom: 1.5rem;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 1rem;
  }

  .hero p {
    color: rgba(255,255,255,0.6);
    font-size: 1rem;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ── Layout ── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  /* ── Contact Cards ── */
  .contact-grid {
    display: grid;
    gap: 2rem;
    margin-top: 2rem;
  }

  .contact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .contact-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.1);
  }

  .contact-icon {
    font-size: 3.5rem;
    margin-bottom: 1.5rem;
    display: block;
  }

  .contact-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .contact-link {
    display: inline-block;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    line-height: 1.4;
  }

  .contact-link:hover {
    color: #1e3a8a;
    text-decoration: underline;
  }

  .contact-card.phone .contact-icon { color: #10b981; }
  .contact-card.email .contact-icon { color: var(--accent); }

  /* ── Hours ── */
  .hours {
    background: var(--tag-bg);
    border-radius: 12px;
    padding: 1.5rem;
    margin-top: 2rem;
    text-align: center;
  }

  .hours h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }

  /* ── Footer ── */
  footer {
    background: var(--text);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 1.5rem;
    font-size: 0.8rem;
  }

  footer a { color: rgba(255,255,255,0.7); text-decoration: none; }

  @media (max-width: 600px) {
    .container { padding: 2rem 1rem 4rem; }
    .contact-card { padding: 2rem 1.5rem; }
    .contact-link { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Brain<span>spark</span></div>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/login">Login</a>
  </nav>
</header>

<!-- Hero -->
<div class="hero">
  <div class="hero-badge">Get In Touch</div>
  <h1>Contact Us</h1>
  <p>Questions about Brainspark? We'd love to hear from you. Reach out directly — we respond within 24 hours.</p>
</div>

<!-- Main Content -->
<div class="container">
  <div class="contact-grid">
    
    <!-- Phone -->
    

    <!-- Email -->
    <div class="contact-card email">
      <div class="contact-icon">✉️</div>
      <h2>Email</h2>
      <a href="brainspark803@gmail.com" class="contact-link">brainspark803@gmail.com</a>
    </div>

  </div>

  <div class="hours">
    <h3>Response Times</h3>
    <p><strong>Email:</strong> Within 24 hours<br>
       
  </div>
</div>

<footer>
  
</footer>

</body>
</html>
