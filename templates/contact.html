<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainspark — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --accent: #2d5be3;
    --accent2: #e8380d;
    --text: #1a1a2e;
    --muted: #6b6b7b;
    --border: #e2ddd6;
    --tag-bg: #eef1fc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* ── Header ── */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo span { color: #6c8aff; }

  header nav a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.875rem;
    margin-left: 1.5rem;
    transition: color 0.2s;
  }

  header nav a:hover { color: #fff; }

  /* ── Hero ── */
  .hero {
    background: var(--text);
    color: #fff;
    padding: 5rem 2rem 4rem;
    text-align: center;
  }

  .hero-badge {
    display: inline-block;
    background: rgba(108,138,255,0.2);
    color: #6c8aff;
    border: 1px solid rgba(108,138,255,0.3);
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.35rem 1rem;
    margin-bottom: 1.5rem;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 1rem;
  }

  .hero p {
    color: rgba(255,255,255,0.6);
    font-size: 1rem;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ── Layout ── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  /* ── Contact Cards ── */
  .contact-grid {
    display: grid;
    gap: 2rem;
    margin-top: 2rem;
  }

  .contact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .contact-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.1);
  }

  .contact-icon {
    font-size: 3.5rem;
    margin-bottom: 1.5rem;
    display: block;
  }

  .contact-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .contact-link {
    display: inline-block;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    line-height: 1.4;
  }

  .contact-link:hover {
    color: #1e3a8a;
    text-decoration: underline;
  }

  .contact-card.phone .contact-icon { color: #10b981; }
  .contact-card.email .contact-icon { color: var(--accent); }

  /* ── Hours ── */
  .hours {
    background: var(--tag-bg);
    border-radius: 12px;
    padding: 1.5rem;
    margin-top: 2rem;
    text-align: center;
  }

  .hours h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }

  /* ── Footer ── */
  footer {
    background: var(--text);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 1.5rem;
    font-size: 0.8rem;
  }

  footer a { color: rgba(255,255,255,0.7); text-decoration: none; }

  @media (max-width: 600px) {
    .container { padding: 2rem 1rem 4rem; }
    .contact-card { padding: 2rem 1.5rem; }
    .contact-link { font-size: 1.1rem; }
    /* ===================== LOADER ===================== */
#bs-loader {
  position: fixed; inset: 0; z-index: 99999;
  background: #080810;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2rem; transition: opacity 0.8s ease, visibility 0.8s ease;
}
#bs-loader.hide { opacity: 0; visibility: hidden; pointer-events: none; }
body.loading { overflow: hidden; }

.bsl-logo-wrap {
  position: relative; display: flex; align-items: center; justify-content: center;
}
.bsl-ring {
  position: absolute; border-radius: 50%;
  border: 2px solid transparent;
  animation: bsl-spin 1.4s linear infinite;
}
.bsl-ring-1 {
  width: 130px; height: 130px;
  border-top-color: #ff4f30; border-right-color: rgba(255,79,48,0.2);
  animation-duration: 1.2s;
}
.bsl-ring-2 {
  width: 150px; height: 150px;
  border-bottom-color: #ff8c5a; border-left-color: rgba(255,140,90,0.15);
  animation-duration: 1.8s; animation-direction: reverse;
}
@keyframes bsl-spin { to { transform: rotate(360deg); } }

.bsl-logo {
  width: 80px; height: 80px; border-radius: 50%;
  background: #0d0d20; padding: 8px;
  animation: bsl-pulse 1.4s ease-in-out infinite;
}
@keyframes bsl-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

.bsl-brand {
  font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800;
  letter-spacing: -0.02em; color: #fff;
  animation: bsl-fadein 0.6s 0.3s both;
}
.bsl-brand span { color: #ff4f30; }

.bsl-tagline {
  font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  animation: bsl-fadein 0.6s 0.5s both;
}
.bsl-bar-wrap {
  width: 220px; height: 3px; background: rgba(255,255,255,0.08);
  border-radius: 2px; overflow: hidden;
  animation: bsl-fadein 0.6s 0.6s both;
}
.bsl-bar {
  height: 100%; width: 0%; border-radius: 2px;
  background: linear-gradient(90deg, #ff4f30, #ff8c5a);
  transition: width 0.35s ease;
}
.bsl-msg {
  font-size: 0.8rem; color: rgba(255,255,255,0.3); letter-spacing: 0.05em;
  min-height: 1.2em; transition: opacity 0.3s;
  animation: bsl-fadein 0.6s 0.7s both;
}
@keyframes bsl-fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  }
</style>
</head>
<body>
  <!-- ======================== LOADER ======================== -->
<div id="bs-loader">
  <div class="bsl-logo-wrap">
    <div class="bsl-ring bsl-ring-1"></div>
    <div class="bsl-ring bsl-ring-2"></div>
    <img class="bsl-logo" src="/static/image/KNOWITNOW.png" alt="Brainspark">
  </div>
  <div class="bsl-brand">Brain<span>Spark</span></div>
  <div class="bsl-tagline">Learn Smarter. Ace Faster.</div>
  <div class="bsl-bar-wrap"><div class="bsl-bar" id="bsl-bar"></div></div>
  <div class="bsl-msg" id="bsl-msg">Initialising…</div>
</div>

<!-- Header -->
<header>
  <div class="logo">Brain<span>spark</span></div>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/login">Login</a>
  </nav>
</header>

<!-- Hero -->
<div class="hero">
  <div class="hero-badge">Get In Touch</div>
  <h1>Contact Us</h1>
  <p>Questions about Brainspark? We'd love to hear from you. Reach out directly — we respond within 24 hours.</p>
</div>

<!-- Main Content -->
<div class="container">
  <div class="contact-grid">
    
    <!-- Phone -->
    

    <!-- Email -->
    <div class="contact-card email">
      <div class="contact-icon">✉️</div>
      <h2>Email</h2>
      <a href="brainspark803@gmail.com" class="contact-link">brainspark803@gmail.com</a>
    </div>

  </div>

  <div class="hours">
    <h3>Response Times</h3>
    <p><strong>Email:</strong> Within 24 hours<br>
       
  </div>
</div>
<script>
  (function() {
    document.body.classList.add('loading');
    const msgs = [
      [0,   'Initialising…'],
      [20,  'Loading AI engine…'],
      [45,  'Preparing your workspace…'],
      [70,  'Almost ready…'],
      [90,  'Sparking up…'],
      [100, 'Welcome to Brainspark ✦'],
    ];
    const bar    = document.getElementById('bsl-bar');
    const msg    = document.getElementById('bsl-msg');
    const loader = document.getElementById('bs-loader');
    let step = 0;
    function tick() {
      if (step >= msgs.length) return;
      const [pct, text] = msgs[step];
      bar.style.width = pct + '%';
      msg.style.opacity = '0';
      setTimeout(() => { msg.textContent = text; msg.style.opacity = '1'; }, 150);
      step++;
      if (step < msgs.length) setTimeout(tick, step === 1 ? 200 : 320);
    }
    setTimeout(tick, 100);
    setTimeout(() => {
      bar.style.width = '100%';
      setTimeout(() => {
        loader.classList.add('hide');
        document.body.classList.remove('loading');
      }, 400);
    }, 2000);
  })();
</script>



</body>
</html>
